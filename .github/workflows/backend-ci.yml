name: Backend CI

on:
  push:
    branches:
      - main
      - development
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches:
      - main
      - development
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Run mypy
        run: >
          mypy
          config
          accounts
          projects
          contracts
          notifications
          chat
          email_organiser
          dashboard

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: contract_mgmt_test
          POSTGRES_USER: contract_user
          POSTGRES_PASSWORD: contract_pass
        options: >-
          --health-cmd "pg_isready -U contract_user -d contract_mgmt_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production-at-all
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://contract_user:contract_pass@localhost:5432/contract_mgmt_test
      POSTGRES_DB: contract_mgmt_test
      POSTGRES_USER: contract_user
      POSTGRES_PASSWORD: contract_pass
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: "15"
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: "7"
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      DEFAULT_FROM_EMAIL: noreply@example.com
      ANTHROPIC_API_KEY: ci-placeholder-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Run pytest
        run: >
          pytest
          --cov=.
          --cov-fail-under=80
          --cov-report=xml
          --cov-report=term-missing
          -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  migration-check:
    name: Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: contract_mgmt_test
          POSTGRES_USER: contract_user
          POSTGRES_PASSWORD: contract_pass
        options: >-
          --health-cmd "pg_isready -U contract_user -d contract_mgmt_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-secret-key-not-used-in-production-at-all
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://contract_user:contract_pass@localhost:5432/contract_mgmt_test
      POSTGRES_DB: contract_mgmt_test
      POSTGRES_USER: contract_user
      POSTGRES_PASSWORD: contract_pass
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      DEFAULT_FROM_EMAIL: noreply@example.com
      ANTHROPIC_API_KEY: ci-placeholder-key

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/development.txt

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Apply migrations
        run: python manage.py migrate

      - name: Run syncdb check
        run: python manage.py migrate --run-syncdb

      - name: Check for missing migrations
        run: python manage.py migrate --check
