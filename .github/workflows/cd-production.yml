name: CD — Production (Render)

# Deploys to Render by hitting each service's Deploy Hook URL. Render
# builds the Docker images from the Dockerfiles in this repo — we do
# NOT push to an external registry, so CI doesn't need image-build jobs.
#
# Gate: this workflow only runs after both Backend CI and Frontend CI
# complete successfully on main. A broken main never ships.

on:
  workflow_run:
    workflows:
      - Backend CI
      - Frontend CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: false  # never cancel an in-flight production deploy

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    # workflow_run fires for every completion; filter to only the
    # successful ones so a red CI doesn't ship.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Trigger backend deploy
        # Render Deploy Hooks are per-service unauthenticated URLs — the
        # secret is the URL itself. Get it from the service's dashboard
        # at Settings → Deploy Hook and paste into GitHub secrets.
        # Worker + beat reuse the backend image, so Render auto-redeploys
        # them when the backend build completes.
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"

      - name: Trigger frontend deploy
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"

      - name: Wait for deploy + smoke-test backend
        # Render builds take ~3-5 min. Poll the API docs endpoint until
        # it returns 200 (the new revision is live) or until we've
        # waited ~10 min total. Fail the workflow if we never see green.
        run: |
          for i in $(seq 1 40); do
            if curl --fail --silent --show-error "${{ vars.PRODUCTION_URL }}/api/docs/" > /dev/null 2>&1; then
              echo "Backend is healthy after $((i * 15))s"
              exit 0
            fi
            sleep 15
          done
          echo "Backend did not respond healthy within 10 minutes"
          exit 1
