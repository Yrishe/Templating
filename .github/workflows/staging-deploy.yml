name: Staging Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging  # Requires manual approval if configured in repo settings

    env:
      IMAGE_TAG: staging-${{ github.sha }}
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------------
      # Build
      # -------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # -------------------------------------------------------
      # Deploy (placeholder — replace with your target platform)
      # -------------------------------------------------------

      # Option A: AWS ECS
      # - name: Deploy to ECS
      #   uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      #   with:
      #     task-definition: ecs-task-def.json
      #     service: contract-mgmt-staging
      #     cluster: contract-mgmt
      #     wait-for-service-stability: true

      # Option B: Google Cloud Run
      # - name: Deploy to Cloud Run
      #   uses: google-github-actions/deploy-cloudrun@v2
      #   with:
      #     service: contract-mgmt-staging
      #     image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
      #     region: eu-west-1

      - name: Deploy placeholder
        run: |
          echo "==> Image built and pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "==> TODO: wire up your deploy step (ECS / Cloud Run / Fly.io / etc.)"

      # -------------------------------------------------------
      # Smoke tests
      # -------------------------------------------------------
      - name: Wait for staging to become healthy
        run: |
          STAGING_URL="${{ secrets.STAGING_URL }}"
          if [ -z "$STAGING_URL" ]; then
            echo "STAGING_URL secret not set — skipping smoke test"
            exit 0
          fi
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health/" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Staging is healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "Attempt $i/12 — HTTP $STATUS, waiting 10 s..."
            sleep 10
          done
          echo "Staging did not become healthy in time"
          exit 1

      - name: Smoke test — API root
        run: |
          STAGING_URL="${{ secrets.STAGING_URL }}"
          if [ -z "$STAGING_URL" ]; then
            echo "STAGING_URL secret not set — skipping smoke test"
            exit 0
          fi
          curl --fail --silent --show-error "$STAGING_URL/api/health/"
          echo "Smoke test passed."

      # -------------------------------------------------------
      # Notify
      # -------------------------------------------------------
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Staging deployment failed for ${{ env.IMAGE_TAG }}"
          # TODO: post to Slack / PagerDuty using a secret webhook
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Staging deploy failed: ${{ env.IMAGE_TAG }}"}' \
          #   ${{ secrets.SLACK_WEBHOOK_URL }}
