[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
testpaths = tests
# Silence upstream-dependency deprecation noise we can't fix in our code.
# pypdf imports ARC4 from `cryptography.hazmat.primitives.ciphers.algorithms`,
# which the cryptography library is relocating — pypdf will catch up in a
# future release. Until then, this warning clutters every test that exercises
# the PDF extraction path.
filterwarnings =
    ignore::DeprecationWarning:pypdf
    ignore::cryptography.utils.CryptographyDeprecationWarning
