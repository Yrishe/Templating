services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: contract_mgmt
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Dev-only binding. Production should drop this mapping entirely
      # and keep Postgres inside the docker network.
      - "127.0.0.1:5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d contract_mgmt"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No host-port mapping — backend/celery reach redis via the docker
    # network (`redis:6379`). For local debugging use
    # `docker compose exec redis redis-cli`.

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  celery:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  celery-beat:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A config beat -l info
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      # Target the `deps` stage of frontend/Dockerfile — it's the only stage
      # that has `node_modules` sitting at /app/node_modules. The final
      # `runner` stage is a lean production image with only the Next.js
      # standalone output, which can't run `npm run dev`. Stopping at `deps`
      # gives us an image with node_modules already installed; the named
      # anonymous volume below then preserves that directory through the
      # `./frontend:/app` host mount.
      target: deps
    restart: unless-stopped
    # Override the Dockerfile CMD; `deps` doesn't set one and we want the
    # Next dev server with HMR against the mounted host source.
    command: sh -c "npm install --legacy-peer-deps --silent && npm run dev"
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
